<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boys Size Chart</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f5f5f5;
    padding:30px;
}

.container{
    display:flex;
    gap:40px;
    align-items:flex-start;
}

.image{
    flex:1;
    text-align:center;
}

.image img{
    width:100%;
    max-width:350px;
}

.tables{
    flex:2;
}

h2{
    color:#5aa400;
    margin-bottom:10px;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-bottom:35px;
}

th{
    background:#7ac142;
    color:white;
    padding:10px;
    border:1px solid white;
}

td{
    text-align:center;
    padding:10px;
    border:1px solid #ddd;
    background:white;
}

tr:nth-child(even){
    background:#f8f8f8;
}
</style>

</head>
<body>

<div class="container">

    <!-- Left Image -->
    <div class="image">
        <img src="https://c8.alamy.com/comp/2C7D921/3d-rendered-medically-accurate-illustration-of-a-young-boy-skeleton-system-2C7D921.jpg" alt="Boy Skeleton">
    </div>

    <!-- Right Tables -->
    <div class="tables">

        <h2>Size Chart - BOYS - CM</h2>

        <table>
            <tr>
                <th>SIZE</th>
                <th>A. HEIGHT</th>
                <th>B. CHEST</th>
                <th>C. WAIST</th>
                <th>D. HIPS</th>
            </tr>

            <tr><td>1</td><td>82</td><td>50</td><td>52</td><td>56</td></tr>
            <tr><td>2</td><td>91</td><td>52</td><td>53</td><td>58</td></tr>
            <tr><td>3</td><td>100</td><td>54</td><td>54</td><td>60</td></tr>
            <tr><td>4</td><td>109</td><td>56</td><td>55</td><td>62</td></tr>
            <tr><td>5</td><td>116</td><td>58</td><td>56</td><td>64</td></tr>
            <tr><td>6</td><td>122</td><td>60</td><td>57</td><td>66</td></tr>
            <tr><td>7</td><td>127</td><td>62</td><td>58</td><td>68</td></tr>
        </table>

        <h2>Size Chart - BOYS - IN</h2>

        <table>
            <tr>
                <th>SIZE</th>
                <th>A. HEIGHT</th>
                <th>B. CHEST</th>
                <th>C. WAIST</th>
                <th>D. HIPS</th>
            </tr>

            <tr><td>1</td><td>32½</td><td>19½</td><td>20½</td><td>22</td></tr>
            <tr><td>2</td><td>35¾</td><td>20¼</td><td>20¾</td><td>22¾</td></tr>
            <tr><td>3</td><td>39⅓</td><td>21⅓</td><td>21¼</td><td>23½</td></tr>
            <tr><td>4</td><td>42¾</td><td>22</td><td>21¾</td><td>24¼</td></tr>
            <tr><td>5</td><td>45¾</td><td>22¾</td><td>22¼</td><td>25</td></tr>
            <tr><td>6</td><td>48</td><td>23½</td><td>22¾</td><td>25¾</td></tr>
            <tr><td>7</td><td>50</td><td>24¼</td><td>23¼</td><td>26¼</td></tr>
        </table>

    </div>

</div>

</body>
</html>
